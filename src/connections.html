<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Монитор соединений</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="connections.css" />
</head>
<body style="background: var(--bg); color: var(--text); overflow-y: hidden;">

  <div class="connections-header">
    <div class="header-top">
      <h2>Монитор соединений</h2>
      <span class="active-count" id="active-count">VPN: 0 | DIRECT: 0</span>
    </div>
    
    <div class="filters-row">
      <div class="search-box">
        <input type="text" id="filter-domain" placeholder="Поиск по домену/IP..." />
      </div>
      <div class="search-box">
        <select id="filter-process">
          <option value="">Все процессы</option>
        </select>
      </div>
      <div class="search-box route-filter-box">
        <select id="filter-route">
          <option value="">Все маршруты</option>
          <option value="proxy">Только VPN</option>
          <option value="direct">Только Direct</option>
        </select>
      </div>
    </div>

    <div class="sort-actions">
      <span style="font-size: 0.8rem; color: var(--text-muted); margin-right: 10px;">Сортировка:</span>
      <button class="sort-btn active" data-sort="time" data-dir="desc">По времени ⬇</button>
      <button class="sort-btn" data-sort="traffic" data-dir="none">По трафику</button>
      <button class="sort-btn" data-sort="process" data-dir="none">По процессу</button>
    </div>
  </div>

  <div class="connections-list-wrapper">
    <div id="connections-list" class="connections-list">
      <!-- Cards will be injected here -->
    </div>
  </div>

  <script type="module" src="connections.js"></script>
</body>
</html>
