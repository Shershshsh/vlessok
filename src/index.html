<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vlessok</title>

    <!-- Подключаем стили -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Подключаем JavaScript (defer = загрузить после HTML) -->
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <!-- ============================================ -->
    <!-- Главный контейнер приложения                 -->
    <!-- Сейчас это просто каркас для тестирования.   -->
    <!-- В следующих этапах здесь появится полный UI.  -->
    <!-- ============================================ -->
    <main class="container">

      <!-- Заголовок приложения -->
      <h1 class="app-title">vlessok</h1>
      <p class="app-subtitle">VPN-клиент · VLESS + Reality</p>

      <!-- Разделительная линия -->
      <hr class="divider" />

      <!-- Секция проверки связи с бэкендом -->
      <div class="test-section">
        <p class="test-description">
          Нажми кнопку, чтобы проверить связь между интерфейсом и Rust-бэкендом:
        </p>

        <!-- Кнопка тестирования -->
        <button id="test-btn" type="button">
          🔌 Проверить связь с бэкендом
        </button>

        <!-- Сюда выведется ответ от Rust -->
        <p id="result-msg" class="result-msg"></p>
      </div>

      <!-- Подвал с версией -->
      <footer class="app-footer">
        <p>Этап 1: Каркас · v0.1.0</p>
      </footer>

    </main>
  </body>
</html>
